name: nfc_attendance_system
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  image_picker: ^1.1.2
  nfc_manager: ^3.5.0
  http: ^1.2.1
  shared_preferences: ^2.2.3
  local_auth: ^2.3.0
  android_id: ^0.5.1
  device_info_plus: ^10.1.2
  cupertino_icons: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^1.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/lab_logo.png

flutter_icons:
  android: true
  image_path: "assets/icon.png"